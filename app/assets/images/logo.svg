<svg xmlns="http://www.w3.org/2000/svg" width="420" height="130" viewBox="0 0 420 130" role="img">
  <title>Talent.ai logo</title>
  <desc>Logo Talent.ai — version progression minimaliste</desc>

  <!-- Texte "talent" : capline y=20, baseline y=90 -->
  <!-- Texte ".AI"    : baseline y=115 -->
  <!-- Barre grande : top=20, bottom=115 => hauteur=95 -->
  <!-- Barre moyenne : top=47, bottom=115 => hauteur=68 -->
  <!-- Barre petite  : top=74, bottom=115 => hauteur=41 -->

  <!-- Barres (de gauche à droite : petite, moyenne, grande) -->
  <rect x="20"  y="74" width="16" height="41" rx="3" fill="#B4B2A9"/>
  <rect x="40"  y="47" width="16" height="68" rx="3" fill="#7F77DD"/>
  <rect x="60"  y="20" width="16" height="95" rx="3" fill="#534AB7"/>

  <!-- Wordmark à droite des barres -->
  <text x="90" y="90" font-family="'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="500" fill="#1a1a1a">talent</text>
  <text x="90" y="115" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" fill="#534AB7" letter-spacing="4">.AI</text>

</svg>
